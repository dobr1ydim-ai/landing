<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оплата — Как повысить самооценку</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --plum-900:#231430; --plum-700:#472C55;
    --gold-400:#C79F60; --gold-500:#AD8148;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:'Inter', Arial, sans-serif;
    background:radial-gradient(130% 110% at 50% -15%, var(--plum-700), var(--plum-900) 60%);
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    color:#FBF7EF; padding:24px;
  }
  .box{ text-align:center; max-width:420px; }
  h1{ font-family:'Fraunces', serif; font-weight:600; font-size:22px; margin-bottom:12px; }
  p{ color:rgba(251,247,239,0.6); font-size:14.5px; line-height:1.6; margin-bottom:30px; }
  .back{ display:inline-block; margin-top:26px; color:rgba(251,247,239,0.45); font-size:13px; text-decoration:underline; }
  .widget-wrap{ min-height:60px; }
</style>
</head>
<body>
  <div class="box">
    <h1>Переходим к оплате</h1>
    <p>Гайд будет отправлен на указанную вами почту сразу после успешной оплаты.</p>
    <div class="widget-wrap" id="widget-wrap"></div>
    <a class="back" href="index.html">← Вернуться на сайт</a>
  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var email = params.get('email') || '';
    var baseUrl = 'https://auth.robokassa.ru/Merchant/PaymentForm/FormV.js?EncodedInvoiceId=3aRz_tsJcUK23gl61OMxhw';
    var src = email ? (baseUrl + '&Email=' + encodeURIComponent(email)) : baseUrl;

    document.write('<script type="text/javascript" src="' + src + '"><' + '/script>');
  </script>
</body>
</html>
